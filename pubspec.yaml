name: taskmate
description: Personal LLM-powered task manager
publish_to: 'none'
version: 1.0.5+9

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  android_alarm_manager_plus: ^5.0.0
  flutter_local_notifications: ^18.0.0
  workmanager: ^0.9.0
  home_widget: ^0.9.3
  http: ^1.2.2
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  timezone: ^0.9.0
  share_plus: 10.1.0
  file_picker: 8.3.3
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
